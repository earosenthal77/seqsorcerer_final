services:
  pipeline:
    image: rnaseq-pipeline:1.0
    volumes:
      - ./test_data/reads:/data/reads:ro
      - ./test_data/reference:/data/reference:ro
      - ./test_data/output:/app/data/output
    command: >
      --fastq-dir /data/reads
      --reference /data/reference/GCF_017654675.1_Xenopus_laevis_v10.1_genomic.fna
      --gtf /data/reference/genomic.gtf
      --outdir /app/data/output